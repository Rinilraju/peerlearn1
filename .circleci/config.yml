version: 2.1

orbs:
  node: circleci/node@5.1.0

x-environments:
  backend-env: &backend-env
    DB_HOST: "127.0.0.1"
    DB_USER: "postgres"
    DB_PASSWORD: "1234"
    DB_NAME: "peerlearn"
    JWT_SECRET: "your_test_jwt_secret"
    PORT: "5000"

jobs:
  # 1. Frontend Unit Testing
  frontend-unit-test:
    docker:
      - image: cimg/node:20.11.1
    steps:
      - checkout
      - run:
          name: Install Frontend Dependencies
          command: npm install
      - run:
          name: Install Vitest and Testing Library
          command: npm install -D vitest @testing-library/react @testing-library/jest-dom jsdom @types/react @types/react-dom
      - run:
          name: Run Frontend Unit Tests (scoped to src/tests only)
          command: npx vitest run src/tests/ --globals --reporter=verbose

  # 2. Backend Unit & Integration Testing
  backend-unit-test:
    docker:
      - image: cimg/node:20.11.1
      - image: cimg/postgres:14.0
        environment:
          POSTGRES_USER: "postgres"
          POSTGRES_DB: "peerlearn"
          POSTGRES_PASSWORD: "1234"
    environment:
      <<: *backend-env
    steps:
      - checkout
      - run:
          name: Wait for PostgreSQL to be fully ready
          command: npx wait-on tcp:5432 -t 60000
      - run:
          name: Install Backend Dependencies
          command: cd backend && npm install
      - run:
          name: Install Jest and Supertest
          command: cd backend && npm install -D jest supertest
      - run:
          name: Start Backend Server in background
          command: cd backend && npm start
          background: true
      - run:
          name: Wait for Backend Health (60s timeout)
          command: npx wait-on http://127.0.0.1:5000/health -t 60000
      - run:
          name: Run Backend Jest Tests
          command: cd backend && npx jest --testPathPattern="src/tests/health.test.js" --forceExit

  # 3. Frontend Functional E2E Testing (Playwright)
  frontend-e2e-test:
    docker:
      - image: cimg/node:20.11.1-browsers
      - image: cimg/postgres:14.0
        environment:
          POSTGRES_USER: "postgres"
          POSTGRES_DB: "peerlearn"
          POSTGRES_PASSWORD: "1234"
    environment:
      <<: *backend-env
    steps:
      - checkout
      - run:
          name: Wait for PostgreSQL to be fully ready
          command: npx wait-on tcp:5432 -t 60000
      - run:
          name: Install and Start Backend
          command: cd backend && npm install && npm start
          background: true
      - run:
          name: Wait for Backend (60s timeout)
          command: npx wait-on http://127.0.0.1:5000/health -t 60000
      - run:
          name: Install Frontend Dependencies and Start App
          command: npm install && npm run dev
          background: true
      - run:
          name: Wait for Frontend
          command: npx wait-on http://127.0.0.1:5173 -t 60000
      - run:
          name: Install and Setup Playwright
          command: npm install -D @playwright/test && npx playwright install --with-deps chromium
      - run:
          name: Run Playwright Functional Tests
          command: npx playwright test playwright-tests/e2e/home.spec.ts

  # 4. Backend Load & Pressure Testing (Artillery)
  backend-load-test:
    docker:
      - image: cimg/node:20.11.1
      - image: cimg/postgres:14.0
        environment:
          POSTGRES_USER: "postgres"
          POSTGRES_DB: "peerlearn"
          POSTGRES_PASSWORD: "1234"
    environment:
      <<: *backend-env
    steps:
      - checkout
      - run:
          name: Wait for PostgreSQL to be fully ready
          command: npx wait-on tcp:5432 -t 60000
      - run:
          name: Install Backend Dependencies
          command: cd backend && npm install
      - run:
          name: Install Artillery
          command: cd backend && npm install -D artillery
      - run:
          name: Start Backend Server
          command: cd backend && npm start
          background: true
      - run:
          name: Wait for Backend (60s timeout)
          command: npx wait-on http://127.0.0.1:5000/health -t 60000
      - run:
          name: Run Load & Pressure Tests
          command: cd backend && npx artillery run load-tester.yml

workflows:
  version: 2
  full-suite-tests:
    jobs:
      - frontend-unit-test
      - backend-unit-test
      - frontend-e2e-test
      - backend-load-test


