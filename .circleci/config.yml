version: 2.1

orbs:
  node: circleci/node@5.1.0

x-environments:
  backend-env: &backend-env
    DB_HOST: "127.0.0.1"
    DB_USER: "postgres"
    DB_PASSWORD: "1234"
    DB_NAME: "peerlearn"
    JWT_SECRET: "your_test_jwt_secret"
    PORT: "5000"

jobs:
  # 1. Frontend Unit Testing
  frontend-unit-test:
    docker:
      - image: cimg/node:20.11.1
    steps:
      - checkout
      - run:
          name: Install Core Frontend Dependencies
          command: npm install
      - run:
          name: Dynamically Install Vitest and RTL
          command: npm install -D vitest @testing-library/react @testing-library/jest-dom jsdom @types/jest
      - run:
          name: Run Frontend Unit Tests
          command: npx vitest run --passWithNoTests

  # 2. Backend Integration/Unit Testing (Jest)
  backend-unit-test:
    docker:
      - image: cimg/node:20.11.1
      - image: cimg/postgres:14.0
        environment:
          POSTGRES_USER: "postgres"
          POSTGRES_DB: "peerlearn"
          POSTGRES_PASSWORD: "1234"
    environment:
      <<: *backend-env
    steps:
      - checkout
      - run:
          name: Wait for PostgreSQL
          command: npx wait-on tcp:5432 -t 60000
      - run:
          name: Install Backend Dependencies + Jest + Supertest
          command: cd backend && npm install && npm install -D jest supertest && npm start
          background: true
      - run:
          name: Wait for Backend to start
          command: npx wait-on tcp:5000 -t 60000
      - run:
          name: Wait for migrations to complete
          command: sleep 10
      - run:
          name: Run Backend Jest Tests
          command: cd backend && npx jest --forceExit

  # 3. Frontend End-to-End Testing (Playwright)
  frontend-e2e-test:
    docker:
      - image: cimg/node:20.11.1-browsers
      - image: cimg/postgres:14.0
        environment:
          POSTGRES_USER: "postgres"
          POSTGRES_DB: "peerlearn"
          POSTGRES_PASSWORD: "1234"
    environment:
      <<: *backend-env
    steps:
      - checkout
      - run:
          name: Wait for PostgreSQL
          command: npx wait-on tcp:5432 -t 60000
      - run:
          name: Install Backend Dependencies & Start Server
          command: |
            cd backend
            npm install
            npm start
          background: true
      - run:
          name: Wait for Backend to start
          command: npx wait-on tcp:5000 -t 60000
      - run:
          name: Wait for migrations to complete
          command: sleep 10
      - run:
          name: Install Frontend Dependencies & Start App
          command: |
            npm install
            npm run dev
          background: true
      - run:
          name: Wait for Frontend
          command: npx wait-on http://127.0.0.1:5173 -t 60000
      - run:
          name: Install and Setup Playwright
          command: |
            npm install -D @playwright/test
            npx playwright install --with-deps chromium
      - run:
          name: Run Playwright E2E Tests
          command: npx playwright test

  # 4. Backend Load + Pressure Testing (Artillery)
  backend-load-test:
    docker:
      - image: cimg/node:20.11.1
      - image: cimg/postgres:14.0
        environment:
          POSTGRES_USER: "postgres"
          POSTGRES_DB: "peerlearn"
          POSTGRES_PASSWORD: "1234"
    environment:
      <<: *backend-env
    steps:
      - checkout
      - run:
          name: Wait for PostgreSQL
          command: npx wait-on tcp:5432 -t 60000
      - run:
          name: Install Backend Dependencies + Artillery
          command: cd backend && npm install && npm install -D artillery && npm start
          background: true
      - run:
          name: Wait for Backend to start
          command: npx wait-on tcp:5000 -t 60000
      - run:
          name: Wait for migrations to complete
          command: sleep 10
      - run:
          name: Run Load & Pressure Tests
          command: cd backend && npx artillery run load-tester.yml

workflows:
  version: 2
  full-suite-tests:
    jobs:
      - frontend-unit-test
      - backend-unit-test
      - frontend-e2e-test
      - backend-load-test

